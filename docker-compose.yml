services:
  ollama:
    image: ollama/ollama:latest
    container_name: echo-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 4G

  ollama-init:
    image: curlimages/curl:latest
    container_name: echo-ollama-init
    depends_on:
      ollama:
        condition: service_healthy
    entrypoint: >
      sh -c "curl -X POST http://ollama:11434/api/pull -d '{\"name\": \"smollm2:1.7b\"}' && echo 'SmolLM2 1.7B pulled'"
    restart: "no"

  backend:
    build: ./backend
    container_name: echo-backend
    ports:
      - "8080:8080"
    environment:
      - OLLAMA_HOST=http://ollama:11434
    depends_on:
      ollama:
        condition: service_healthy

volumes:
  ollama_data:
